openapi: 3.0.3
info:
  title: jobtech API
  version: 1.0.0
  description: Indicateurs du marché de l'emploi Tech (salaires, volumes) servis depuis
    un Data Warehouse en étoile. Versionnée /api/v1/.
paths:
  /api/v1/auth/token/:
    post:
      operationId: v1_auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: v1_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/token/verify/:
    post:
      operationId: v1_auth_token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerify'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenVerify'
          description: ''
  /api/v1/dimensions/:
    get:
      operationId: v1_dimensions_retrieve
      description: Liste les valeurs disponibles des dimensions (pour construire des
        requêtes).
      tags:
      - v1
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dimension'
          description: ''
  /api/v1/salary-cube/:
    get:
      operationId: v1_salary_cube_list
      description: |-
        Cube multidimensionnel : agrège salaire (moyenne, médiane) et volume selon
        les dimensions demandées (pays × compétence × source × année × mois).
      parameters:
      - in: query
        name: country
        schema:
          type: string
        description: Code pays ISO2 (ex. FR)
      - in: query
        name: dimensions
        schema:
          type: string
        description: 'Dimensions du cube séparées par des virgules (parmi country,
          skill, source, year, month). Défaut: country,skill'
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: skill
        schema:
          type: string
        description: Compétence normalisée (ex. python)
      - in: query
        name: source
        schema:
          type: string
        description: Source (ex. adzuna)
      tags:
      - v1
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCubeCellList'
          description: ''
  /api/v1/salary-daily/:
    get:
      operationId: v1_salary_daily_list
      description: Série temporelle du salaire moyen par jour (filtrable).
      parameters:
      - in: query
        name: country
        schema:
          type: string
        description: Code pays ISO2 (ex. FR)
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: skill
        schema:
          type: string
        description: Compétence normalisée (ex. python)
      - in: query
        name: source
        schema:
          type: string
        description: Source (ex. adzuna)
      tags:
      - v1
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSalaryDailyList'
          description: ''
  /api/v1/salary-stats/:
    get:
      operationId: v1_salary_stats_retrieve
      description: Distribution salariale (médiane, P25, P75, moyenne) sur un périmètre
        filtré.
      parameters:
      - in: query
        name: country
        schema:
          type: string
        description: Code pays ISO2 (ex. FR)
      - in: query
        name: skill
        schema:
          type: string
        description: Compétence normalisée (ex. python)
      - in: query
        name: source
        schema:
          type: string
        description: Source (ex. adzuna)
      tags:
      - v1
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalaryStats'
          description: ''
components:
  schemas:
    CubeCell:
      type: object
      description: Cellule du cube multidimensionnel salaire (dimensions variables).
      properties:
        country:
          type: string
        skill:
          type: string
        source:
          type: string
        year:
          type: integer
        month:
          type: integer
        avg_salary:
          type: number
          format: double
          nullable: true
        median_salary:
          type: number
          format: double
          nullable: true
        job_count:
          type: integer
      required:
      - avg_salary
      - job_count
      - median_salary
    Dimension:
      type: object
      description: Valeurs disponibles d'une dimension (pour construire des requêtes).
      properties:
        countries:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            type: string
      required:
      - countries
      - skills
      - sources
    PaginatedCubeCellList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=400&limit=100
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=200&limit=100
        results:
          type: array
          items:
            $ref: '#/components/schemas/CubeCell'
    PaginatedSalaryDailyList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=400&limit=100
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=200&limit=100
        results:
          type: array
          items:
            $ref: '#/components/schemas/SalaryDaily'
    SalaryDaily:
      type: object
      description: Point d'une série temporelle de salaire moyen.
      properties:
        date:
          type: string
          format: date
        avg_salary:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        job_count:
          type: integer
      required:
      - avg_salary
      - date
      - job_count
    SalaryStats:
      type: object
      description: Statistiques de distribution salariale (médiane / quartiles).
      properties:
        median:
          type: number
          format: double
          nullable: true
        p25:
          type: number
          format: double
          nullable: true
        p75:
          type: number
          format: double
          nullable: true
        avg:
          type: number
          format: double
          nullable: true
        sample_size:
          type: integer
      required:
      - avg
      - median
      - p25
      - p75
      - sample_size
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    TokenVerify:
      type: object
      properties:
        token:
          type: string
          writeOnly: true
      required:
      - token
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
